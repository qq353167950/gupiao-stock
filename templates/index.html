<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票智能分析 - AI驱动的投资决策平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        .sector-card {
            transition: all 0.3s ease;
        }
        .sector-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        }
        .stock-item {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        .stock-item:hover {
            border-left-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }
    </style>
</head>
<body x-data="stockAnalyzer()">
    
    <!-- 顶部导航 -->
    <nav class="glass shadow-lg">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-500 to-indigo-600 flex items-center justify-center">
                        <span class="text-white text-xl font-bold">📈</span>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">股票智能分析</h1>
                        <p class="text-xs text-gray-500">AI驱动的投资决策平台</p>
                    </div>
                </div>
                <div class="flex items-center space-x-6">
                    <a href="#recommendations" class="text-gray-600 hover:text-purple-600 text-sm font-medium">今日推荐</a>
                    <a href="#analysis" class="text-gray-600 hover:text-purple-600 text-sm font-medium">开始分析</a>
                    <a href="#history" class="text-gray-600 hover:text-purple-600 text-sm font-medium">历史记录</a>
                    <a href="/glossary" class="text-gray-600 hover:text-purple-600 text-sm font-medium">📖 名词解释</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-12">
        
        <!-- Hero Section -->
        <div class="glass rounded-3xl p-12 mb-8 text-center">
            <h2 class="text-4xl font-bold gradient-text mb-4">智能分析，精准决策</h2>
            <p class="text-gray-600 text-lg mb-8">基于22维数据深度分析，50位AI评委投票，DCF/LBO双重估值</p>
            
            <!-- 搜索框 -->
            <div id="analysis" class="max-w-2xl mx-auto">
                <div class="relative">
                    <input 
                        type="text" 
                        x-model="ticker"
                        placeholder="输入股票代码或名称，如 600519 / 贵州茅台 / AAPL"
                        class="w-full px-6 py-4 rounded-2xl border-2 border-gray-200 focus:border-purple-500 focus:outline-none text-lg shadow-sm"
                        @keyup.enter="startAnalysis()"
                    >
                    <button 
                        @click="startAnalysis()"
                        :disabled="loading"
                        class="absolute right-2 top-2 btn-primary text-white px-8 py-3 rounded-xl font-medium disabled:opacity-50"
                    >
                        <span x-show="!loading">开始分析</span>
                        <span x-show="loading">分析中...</span>
                    </button>
                </div>
                
                <!-- 分析深度选择 -->
                <div class="flex items-center justify-center space-x-4 mt-6">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" x-model="depth" value="quick" class="text-purple-600 focus:ring-purple-500">
                        <span class="text-sm text-gray-600">快速 (5-10分钟)</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" x-model="depth" value="standard" class="text-purple-600 focus:ring-purple-500" checked>
                        <span class="text-sm font-medium text-gray-900">标准 (20-30分钟)</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" x-model="depth" value="deep" class="text-purple-600 focus:ring-purple-500">
                        <span class="text-sm text-gray-600">深度 (40-60分钟)</span>
                    </label>
                </div>
                
                <!-- 错误提示 -->
                <div x-show="error" class="mt-4 p-4 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm">
                    <span x-text="error"></span>
                </div>
            </div>
        </div>

        <!-- 今日推荐 -->
        <div id="recommendations" class="glass rounded-3xl p-8 mb-8">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h2 class="text-2xl font-bold text-gray-900 mb-2">今日推荐</h2>
                    <p class="text-gray-500">A股24个细分板块 · 深度分析精选</p>
                </div>
                <div class="px-4 py-2 bg-purple-50 rounded-full">
                    <span class="text-purple-600 font-semibold" x-text="Object.keys(sectors).length + ' 个板块'"></span>
                </div>
            </div>
            
            <div x-show="Object.keys(sectors).length === 0" class="text-center py-16">
                <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-gray-100 flex items-center justify-center">
                    <span class="text-4xl">📊</span>
                </div>
                <p class="text-gray-500">早盘推荐暂无数据</p>
                <p class="text-sm text-gray-400 mt-2">每交易日 15:10 收盘后开始分析，次日 8:20 前完成</p>
            </div>
            
            <!-- 板块列表 -->
            <div class="grid grid-cols-1 gap-6" x-show="Object.keys(sectors).length > 0">
                <template x-for="(stocks, sectorName) in sectors" :key="sectorName">
                    <div class="sector-card bg-white rounded-2xl p-6 shadow-sm">
                        <!-- 板块标题 -->
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-lg font-bold text-gray-900" x-text="sectorName"></h3>
                            <span class="text-sm text-gray-500" x-text="stocks.length + ' 只'"></span>
                        </div>
                        
                        <!-- 股票列表 -->
                        <div class="space-y-3">
                            <template x-for="(stock, index) in stocks" :key="stock.ticker">
                                <div class="stock-item p-4 rounded-xl cursor-pointer" @click="analyzeStock(stock.ticker)">
                                    <div class="flex items-center justify-between">
                                        <div class="flex items-center space-x-3 flex-1">
                                            <span x-show="index === 0" class="text-2xl">🥇</span>
                                            <span x-show="index !== 0" class="text-2xl">⭐</span>
                                            <div class="flex-1">
                                                <div class="flex items-center space-x-2">
                                                    <h4 class="font-semibold text-gray-900" x-text="stock.name"></h4>
                                                    <span class="text-xs text-gray-400" x-text="stock.ticker"></span>
                                                    <!-- 风险等级图标 -->
                                                    <span x-show="stock.risk_level" class="text-xs font-medium px-2 py-0.5 rounded"
                                                          :class="{
                                                              'bg-green-100 text-green-700': stock.risk_level && stock.risk_level.includes('低风险'),
                                                              'bg-yellow-100 text-yellow-700': stock.risk_level && stock.risk_level.includes('中风险'),
                                                              'bg-orange-100 text-orange-700': stock.risk_level && stock.risk_level.includes('高风险') && !stock.risk_level.includes('极'),
                                                              'bg-red-100 text-red-700': stock.risk_level && stock.risk_level.includes('极高风险')
                                                          }"
                                                          x-text="stock.risk_level"></span>
                                                </div>
                                                <p class="text-sm text-gray-500 mt-1" x-text="stock.reason"></p>
                                            </div>
                                        </div>
                                        <div class="text-right ml-4">
                                            <div class="text-2xl font-bold gradient-text" x-text="stock.composite_score ? stock.composite_score.toFixed(0) : (stock.score ? stock.score.toFixed(0) : 'N/A')"></div>
                                            <div class="text-xs text-gray-400">综合评分</div>
                                        </div>
                                    </div>
                                    
                                    <!-- 数据指标 -->
                                    <div class="flex items-center space-x-6 mt-4 pt-4 border-t border-gray-100">
                                        <div x-show="stock.dcf_discount">
                                            <span class="text-xs text-gray-500">DCF估值</span>
                                            <span class="ml-2 text-sm font-semibold text-green-600" x-text="'低估' + (stock.dcf_discount * 100).toFixed(0) + '%'"></span>
                                        </div>
                                        <div x-show="stock.bullish_ratio">
                                            <span class="text-xs text-gray-500">看多比例</span>
                                            <span class="ml-2 text-sm font-semibold text-purple-600" x-text="(stock.bullish_ratio * 100).toFixed(0) + '%'"></span>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- 历史记录 -->
        <div id="history" class="glass rounded-3xl p-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-6">历史记录</h2>
            
            <div x-show="history.length === 0" class="text-center py-12">
                <p class="text-gray-500">暂无历史记录</p>
            </div>
            
            <div class="space-y-3" x-show="history.length > 0">
                <template x-for="record in history" :key="record.task_id">
                    <a :href="'/analyze?task_id=' + record.task_id" 
                       class="block p-4 bg-white rounded-xl hover:shadow-md transition-all">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-4">
                                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-purple-100 to-indigo-100 flex items-center justify-center">
                                    <span class="text-xl">📈</span>
                                </div>
                                <div>
                                    <h4 class="font-semibold text-gray-900" x-text="record.name || record.ticker"></h4>
                                    <p class="text-sm text-gray-500" x-text="formatDate(record.created_at)"></p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-3">
                                <span class="px-3 py-1 rounded-full text-xs font-medium"
                                      :class="{
                                          'bg-green-100 text-green-700': record.status === 'completed',
                                          'bg-yellow-100 text-yellow-700': record.status === 'running',
                                          'bg-gray-100 text-gray-700': record.status === 'pending',
                                          'bg-red-100 text-red-700': record.status === 'failed'
                                      }"
                                      x-text="record.status === 'completed' ? '已完成' : record.status === 'running' ? '进行中' : record.status === 'pending' ? '排队中' : '失败'">
                                </span>
                                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                                </svg>
                            </div>
                        </div>
                    </a>
                </template>
            </div>
        </div>

    </div>



    <script>
        function stockAnalyzer() {
            return {
                ticker: '',
                depth: 'standard',
                loading: false,
                error: '',
                sectors: {},
                history: [],
                
                async startAnalysis() {
                    if (!this.ticker.trim()) {
                        this.error = '请输入股票代码或名称';
                        return;
                    }
                    
                    this.loading = true;
                    this.error = '';
                    
                    try {
                        const response = await fetch('/api/analyze', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                ticker: this.ticker,
                                depth: this.depth
                            })
                        });
                        
                        if (!response.ok) {
                            throw new Error('分析请求失败');
                        }
                        
                        const data = await response.json();
                        window.location.href = '/analyze?task_id=' + data.task_id;
                        
                    } catch (err) {
                        this.error = err.message || '分析启动失败，请重试';
                        this.loading = false;
                    }
                },
                
                analyzeStock(ticker) {
                    this.ticker = ticker;
                    this.startAnalysis();
                },
                
                async loadRecommendations() {
                    try {
                        const response = await fetch('/api/recommendations/today?rec_type=morning');
                        const data = await response.json();
                        this.sectors = data.sectors || {};
                    } catch (err) {
                        console.error('加载推荐失败:', err);
                    }
                },
                
                async loadHistory() {
                    try {
                        const response = await fetch('/api/history?limit=10');
                        const data = await response.json();
                        this.history = data.records || [];
                    } catch (err) {
                        console.error('加载历史记录失败:', err);
                    }
                },
                
                formatDate(dateStr) {
                    if (!dateStr) return '';
                    const date = new Date(dateStr);
                    return date.toLocaleString('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                },
                
                init() {
                    this.loadRecommendations();
                    this.loadHistory();
                }
            }
        }
    </script>
</body>
</html>
