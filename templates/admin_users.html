{% extends "base.html" %}

{% block title %}用户管理 - 股票智能分析{% endblock %}

{% block body_attrs %}x-data="adminUsersPage()"{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-6 py-12">

    <!-- 创建账号 -->
    <div class="glass rounded-3xl p-8 mb-8">
        <h2 class="text-2xl font-bold text-gray-900 mb-2">创建账号</h2>
        <p class="text-gray-500 text-sm mb-6">本站不开放自助注册，新账号仅能由管理员在此开设</p>

        <form @submit.prevent="createUser()" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <input type="text" x-model="newUsername"
                       class="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-purple-500 focus:outline-none"
                       placeholder="3-50 个字符">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">初始密码</label>
                <input type="text" x-model="newPassword"
                       class="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-purple-500 focus:outline-none"
                       placeholder="至少 6 位">
            </div>
            <label class="flex items-center space-x-2 py-2.5 cursor-pointer">
                <input type="checkbox" x-model="newIsAdmin" class="rounded text-purple-600 focus:ring-purple-500">
                <span class="text-sm text-gray-700">设为管理员</span>
            </label>
            <button type="submit" :disabled="creating"
                    class="btn-primary text-white px-6 py-2.5 rounded-xl font-medium disabled:opacity-50">
                <span x-show="!creating">创建</span>
                <span x-show="creating">创建中...</span>
            </button>
        </form>

        <div x-show="message" class="mt-4 p-3 rounded-xl text-sm" x-cloak
             :class="messageOk ? 'bg-green-50 border border-green-200 text-green-700' : 'bg-red-50 border border-red-200 text-red-600'">
            <span x-text="message"></span>
        </div>
    </div>

    <!-- 用户列表 -->
    <div class="glass rounded-3xl p-8">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold text-gray-900">全部用户</h2>
            <div class="flex items-center space-x-4">
                <!-- 密码显示开关（默认隐藏，一键切换全部账号） -->
                <label class="flex items-center space-x-2 cursor-pointer select-none">
                    <span class="text-sm text-gray-600">显示密码</span>
                    <div class="relative">
                        <input type="checkbox" x-model="showPasswords" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-200 rounded-full peer-checked:bg-purple-600 transition-colors"></div>
                        <div class="absolute left-0.5 top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform"
                             :class="showPasswords ? 'translate-x-5' : ''"></div>
                    </div>
                </label>
                <div class="px-4 py-2 bg-purple-50 rounded-full">
                    <span class="text-purple-600 font-semibold" x-text="users.length + ' 个账号'"></span>
                </div>
            </div>
        </div>

        <div x-show="!loaded" class="text-center py-8">
            <p class="text-gray-400">加载中...</p>
        </div>

        <div class="space-y-3" x-show="loaded">
            <template x-for="u in users" :key="u.id">
                <div class="flex items-center justify-between p-4 bg-white rounded-xl">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-100 to-indigo-100 flex items-center justify-center">
                            <span class="text-lg" x-text="u.is_admin ? '👑' : '👤'"></span>
                        </div>
                        <div>
                            <div class="flex items-center space-x-2">
                                <h4 class="font-semibold text-gray-900" x-text="u.username"></h4>
                                <span x-show="u.is_admin" class="text-xs px-1.5 py-0.5 rounded bg-purple-100 text-purple-600">管理员</span>
                            </div>
                            <div class="flex items-center space-x-3">
                                <p class="text-xs text-gray-400" x-text="'创建于 ' + formatDate(u.created_at)"></p>
                                <p class="text-xs font-mono">
                                    <span class="text-gray-400">密码：</span><!--
                                    历史账号明文列可能为空（该账号下次登录后自动补齐）
                                    --><span class="text-gray-700"
                                          x-text="showPasswords ? (u.password || '未记录（该账号登录一次后可见）') : '••••••'"></span>
                                </p>
                            </div>
                        </div>
                    </div>
                    <button @click="deleteUser(u)"
                            class="text-sm text-gray-400 hover:text-red-500 px-3 py-1.5 rounded-lg hover:bg-red-50 transition-all">
                        删除
                    </button>
                </div>
            </template>
        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script>
    function adminUsersPage() {
        return {
            users: [],
            loaded: false,
            creating: false,
            showPasswords: false,  // 密码列显示开关，默认隐藏
            newUsername: '',
            newPassword: '',
            newIsAdmin: false,
            message: '',
            messageOk: false,

            async loadUsers() {
                try {
                    const response = await fetch('/api/auth/users');
                    if (!response.ok) throw new Error();
                    const data = await response.json();
                    this.users = data.users || [];
                } catch (err) {
                    console.error('加载用户列表失败:', err);
                } finally {
                    this.loaded = true;
                }
            },

            async createUser() {
                if (!this.newUsername.trim() || !this.newPassword) {
                    this.showMessage('请填写用户名和初始密码', false);
                    return;
                }
                this.creating = true;
                try {
                    const response = await fetch('/api/auth/users', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: this.newUsername,
                            password: this.newPassword,
                            is_admin: this.newIsAdmin
                        })
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.detail || '创建失败');
                    this.showMessage(`账号「${data.username}」创建成功`, true);
                    this.newUsername = '';
                    this.newPassword = '';
                    this.newIsAdmin = false;
                    this.loadUsers();
                } catch (err) {
                    this.showMessage(err.message || '创建失败', false);
                } finally {
                    this.creating = false;
                }
            },

            async deleteUser(u) {
                if (!confirm(`确定删除账号「${u.username}」？该操作不可恢复`)) return;
                try {
                    const response = await fetch('/api/auth/users/' + u.id, { method: 'DELETE' });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.detail || '删除失败');
                    this.showMessage(`账号「${u.username}」已删除`, true);
                    this.loadUsers();
                } catch (err) {
                    this.showMessage(err.message || '删除失败', false);
                }
            },

            showMessage(text, ok) {
                this.message = text;
                this.messageOk = ok;
            },

            init() {
                this.loadUsers();
            }
        }
    }
</script>
{% endblock %}
