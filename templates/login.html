{% extends "base.html" %}

{% block title %}登录 - 股票智能分析{% endblock %}

{% block body_attrs %}x-data="loginPage()"{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 sm:px-6 py-16 sm:py-20">

    <div class="glass rounded-[2rem] p-8 sm:p-10">
        <div class="text-center mb-8">
            <div class="w-14 h-14 mx-auto mb-5 rounded-2xl bg-slate-950 text-white flex items-center justify-center font-black">AI</div>
            <h2 class="text-3xl font-black gradient-text mb-2">登录</h2>
            <p class="text-slate-500 text-sm">发起分析与查看报告需登录</p>
        </div>

        <form @submit.prevent="submit()">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">用户名</label>
                    <input
                        type="text"
                        x-model="username"
                        autocomplete="username"
                        class="w-full px-4 py-3 rounded-2xl bg-white/85 soft-ring focus:outline-none focus:ring-4 focus:ring-blue-100"
                        placeholder="请输入用户名"
                    >
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">密码</label>
                    <input
                        type="password"
                        x-model="password"
                        autocomplete="current-password"
                        class="w-full px-4 py-3 rounded-2xl bg-white/85 soft-ring focus:outline-none focus:ring-4 focus:ring-blue-100"
                        placeholder="请输入密码"
                    >
                </div>
            </div>

            <div x-show="error" class="mt-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm" x-cloak>
                <span x-text="error"></span>
            </div>

            <button
                type="submit"
                :disabled="loading"
                class="btn-primary w-full text-white py-3 rounded-2xl font-bold mt-6 disabled:opacity-50"
            >
                <span x-show="!loading">登 录</span>
                <span x-show="loading">登录中...</span>
            </button>
        </form>

        <p class="text-center text-xs text-slate-400 mt-6">
            没有账号？账号由管理员统一开设，请联系站点管理员
        </p>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script>
    function loginPage() {
        return {
            username: '',
            password: '',
            loading: false,
            error: '',

            async submit() {
                if (!this.username.trim() || !this.password) {
                    this.error = '请输入用户名和密码';
                    return;
                }
                this.loading = true;
                this.error = '';
                try {
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: this.username, password: this.password })
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(data.detail || '登录失败');
                    }
                    // 回跳地址仅允许站内路径，防开放重定向
                    const params = new URLSearchParams(location.search);
                    const next = params.get('next') || '/';
                    location.href = next.startsWith('/') ? next : '/';
                } catch (err) {
                    this.error = err.message || '登录失败，请重试';
                    this.loading = false;
                }
            }
        }
    }
</script>
{% endblock %}
